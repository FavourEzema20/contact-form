<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">Back to home</a>
      </nav>
      <hr />
    </header>
    <h2>Registration Form</h2>
    <form>
      <div>
        <label for="name">Full name:</label>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="Enter your full name"
          required
        />
        <br />
        <br />

        <label for="email">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter your email"
          required
        />
        <br />
        <br />

        <label for="password">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Enter your password"
          required
        />
      </div>
      <br />

      <label>Gender:</label><br />
      <input type="radio" name="gender" value="male" /> Male
      <input type="radio" name="gender" value="female" /> Female <br /><br />

      <label>Hobbies:</label><br />
      <input type="checkbox" name="hobby" value="reading" /> Reading
      <input type="checkbox" name="hobby" value="sports" /> Sports
      <input type="checkbox" name="hobby" value="music" /> Music
      <input type="checkbox" name="hobby" value="writing" /> Writing
      <input type="checkbox" name="hobby" value="drawing" /> Drawing
      <input type="checkbox" name="hobby" value="gaming" /> Gaming
      <input type="checkbox" name="hobby" value="travelling" /> Travelling
      <input type="checkbox" name="hobby" value="cooking" /> Cooking<br /><br />

      <label for="course">Select Course:</label>

      <select id="course" name="course" required>
        <option value="">-- Choose a Course --</option>
        <option value="web">Web Development</option>
        <option value="data">Data Analysis</option>
        <option value="design">UI/UX Design</option>
        <option value="marketing">Digital Marketing</option>
        <option value="cyber">Cyber Security</option>
        <option value="ai">Artificial Intelligence</option>
      </select>
      <br /><br />
      <label for="bio">About You:</label>
      <textarea
        name="bio"
        id="bio"
        rows="5"
        cols="30"
        placeholder="About Yourself..."
        required
      ></textarea>
      <br /><br />
      <button type="submit">Register</button>
    </form>

    <footer><p>&copy; 2025 My Website</p></footer>
  </body>
</html>
